name: Deploy to Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e
            echo "===== 开始部署 jlyl-cloud ====="
            cd /opt/jlyl-cloud

            # 拉取最新代码
            echo ">>> 拉取最新代码..."
            # 使用 SSH 协议但走 443 端口（避免服务器 22 端口被墙）
            # 配置 ssh.github.com:443 作为 github.com 的别名
            mkdir -p ~/.ssh
            echo "Host github.com" > ~/.ssh/config
            echo "  Hostname ssh.github.com" >> ~/.ssh/config
            echo "  Port 443" >> ~/.ssh/config
            echo "  User git" >> ~/.ssh/config
            echo "  StrictHostKeyChecking no" >> ~/.ssh/config
            git remote set-url origin git@github.com:Vasvons/jlyl-raas-cloud.git
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            # 创建 .env 文件（如果不存在）
            if [ ! -f .env ]; then
              echo ">>> 创建 .env 文件..."
              cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            WORKER_SECRET=${{ secrets.WORKER_SECRET }}
            EOF
            else
              echo ">>> .env 文件已存在，跳过创建"
            fi

            # 构建并启动服务（兼容新版Docker使用 docker compose，旧版使用 docker-compose）
            echo ">>> 检测 docker compose 命令..."
            if docker compose version > /dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose > /dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "错误：未找到 docker compose 或 docker-compose 命令"
              exit 1
            fi
            echo ">>> 使用命令: $DC"

            # 先配置 Docker 镜像加速器（在 prune 之前，确保后续拉取镜像时加速器已生效）
            echo ">>> 更新 Docker 镜像加速器配置..."
            mkdir -p /etc/docker
            echo '{"registry-mirrors":["https://0vmzj3q6.mirror.aliyuncs.com","https://docker.m.daocloud.io","https://docker.mirrors.ustc.edu.cn"]}' > /etc/docker/daemon.json
            systemctl restart docker
            echo ">>> Docker 已重启，等待 buildkit 完全就绪..."
            # 等待 Docker daemon 完全就绪（最多等 30 秒）
            for i in $(seq 1 15); do
              if docker info > /dev/null 2>&1; then
                echo ">>> Docker daemon 已就绪"
                break
              fi
              echo "等待 Docker daemon 启动... ($i/15)"
              sleep 2
            done
            # 额外等待 buildkit 就绪
            sleep 5
            # 验证镜像加速器是否生效
            echo ">>> 验证镜像加速器配置："
            docker info 2>/dev/null | grep -A5 "Registry Mirrors" || echo "警告：未检测到镜像加速器配置"

            # 清理 Docker 无用资源（保留构建缓存，避免 buildkit 状态不一致）
            echo ">>> 清理Docker无用资源释放磁盘空间..."
            docker container prune -f 2>/dev/null || true
            # 只清理悬空的构建缓存（不加 -a，保留已构建的层缓存，加速后续 build）
            docker builder prune -f 2>/dev/null || true
            # 只清理未使用的镜像（不加 -a），保留基础镜像缓存
            docker image prune -f 2>/dev/null || true
            # 清理系统日志（保留最近1天）
            journalctl --vacuum-time=1d 2>/dev/null || true
            # 清理apt缓存
            apt-get clean 2>/dev/null || true
            rm -rf /var/cache/apt/archives/* 2>/dev/null || true
            # 清理临时文件
            rm -rf /tmp/* 2>/dev/null || true

            echo ">>> 查看磁盘空间："
            df -h /

            # 预拉取基础镜像（带重试，失败不阻塞部署，docker compose build 会自动拉取）
            echo ">>> 预拉取基础镜像..."
            for img in node:18-alpine docker.m.daocloud.io/pgvector/pgvector:pg15 nginx:alpine; do
              # 检查镜像是否已存在（缓存），存在则跳过
              if docker images --format '{{.Repository}}:{{.Tag}}' | grep -q "^${img}$"; then
                echo ">>> $img 已存在，跳过拉取"
                continue
              fi
              pulled=false
              for attempt in 1 2 3 4 5; do
                echo ">>> 拉取 $img (尝试 $attempt/5)..."
                if docker pull $img; then
                  echo ">>> $img 拉取成功"
                  pulled=true
                  break
                fi
                sleep 5
              done
              if [ "$pulled" = false ]; then
                echo ">>> 警告：$img 拉取失败，将在 docker compose build 时自动拉取"
              fi
            done

            echo ">>> 停止所有服务..."
            $DC down --remove-orphans 2>/dev/null || true

            # 强制清理可能残留的容器（避免容器名冲突）
            # Docker daemon 重启后，容器可能需要多次尝试才能删除
            echo ">>> 强制清理残留容器（带重试）..."
            for rm_attempt in 1 2 3; do
              # 先用 docker compose down 清理
              $DC down --remove-orphans 2>/dev/null || true
              # 再强制删除指定容器
              docker rm -f jlyl-cloud-server jlyl-cloud-db jlyl-cloud-auto-collect-worker jlyl-cloud-publish-worker jlyl-cloud-web 2>/dev/null || true
              # 用 ps -a 查询是否还有残留
              remaining=$(docker ps -a --filter "name=jlyl-cloud-" --format '{{.Names}}' 2>/dev/null || echo "")
              if [ -z "$remaining" ]; then
                echo ">>> 残留容器已清理干净"
                break
              fi
              echo ">>> 仍有残留容器: $remaining，重试 ($rm_attempt/3)..."
              sleep 3
            done

            # 最终检查：如果仍有残留，用 docker ps -a -q 强制删除
            final_remaining=$(docker ps -a --filter "name=jlyl-cloud-" --format '{{.Names}}' 2>/dev/null || echo "")
            if [ -n "$final_remaining" ]; then
              echo ">>> 警告：仍有残留容器，尝试用 ps -a -q 强制删除: $final_remaining"
              docker ps -a --filter "name=jlyl-cloud-" -q | xargs -r docker rm -f 2>/dev/null || true
              sleep 2
            fi

            echo ">>> 启动数据库容器..."
            $DC up -d db

            echo ">>> 等待数据库健康（最多等待180秒）..."
            db_healthy=false
            for i in $(seq 1 36); do
              status=$($DC ps --format json db 2>/dev/null | grep -o '"Health":"healthy"' || echo "")
              if [ -n "$status" ]; then
                echo ">>> 数据库已健康"
                db_healthy=true
                break
              fi
              echo "等待数据库启动... ($i/36)"
              sleep 5
            done

            if [ "$db_healthy" = false ]; then
              echo ">>> 数据库健康检查失败，输出数据库日志："
              $DC logs --tail 100 db
              echo ">>> 数据库容器状态："
              $DC ps -a db
              exit 1
            fi

            echo ">>> 数据库状态:"
            $DC ps db

            echo ">>> 构建 Docker 镜像（带重试）..."
            build_success=false
            for attempt in 1 2 3; do
              echo ">>> 构建尝试 $attempt/3..."
              # auto-collect-worker 单独 --no-cache 构建（避免 Docker 层缓存命中旧 Playwright 版本，
              # 导致 headless: 'new' 报 "expected boolean, got string" 错误）
              if $DC build --no-cache auto-collect-worker && $DC build --no-cache auto-publish-worker && $DC build; then
                echo ">>> 构建成功"
                build_success=true
                break
              fi
              echo ">>> 构建失败，清理 buildkit 状态后重试..."
              docker builder prune -f 2>/dev/null || true
              sleep 5
            done
            if [ "$build_success" = false ]; then
              echo ">>> 错误：Docker 镜像构建连续 3 次失败"
              exit 1
            fi

            echo ">>> 先启动 server 容器（单独启动，便于捕获启动日志）..."
            $DC up -d --no-deps server

            # 等待 server 启动并执行迁移（migrate 在启动时自动执行）
            echo ">>> 等待 server 启动（最多 120 秒）..."
            server_healthy=false
            for i in $(seq 1 24); do
              status=$($DC ps --format json server 2>/dev/null | grep -o '"Health":"healthy"' || echo "")
              if [ -n "$status" ]; then
                echo ">>> server 已健康"
                server_healthy=true
                break
              fi
              # 检查容器是否已退出（崩溃）
              container_state=$($DC ps -a --format json server 2>/dev/null | grep -o '"State":"exited"' || echo "")
              if [ -n "$container_state" ]; then
                echo ">>> server 容器已退出（崩溃），输出完整日志："
                $DC logs --tail 200 server
                exit 1
              fi
              echo "等待 server 启动... ($i/24)"
              sleep 5
            done

            if [ "$server_healthy" = false ]; then
              echo ">>> server 健康检查失败，输出完整日志："
              $DC logs --tail 200 server
              echo ">>> server 容器状态："
              $DC ps -a server
              exit 1
            fi

            # 启动其余服务（web 和 worker，它们依赖 server 健康）
            # v2.5.35：用 --no-deps 单独启动 web 和 worker，避免 $DC up -d 触发 server 容器 recreate 导致容器名冲突
            echo ">>> 启动 web 和 worker 服务（不重启 server）..."
            $DC up -d --no-deps web
            $DC up -d --no-deps auto-collect-worker 2>/dev/null || true
            $DC up -d --no-deps auto-publish-worker 2>/dev/null || true

            # 等待服务启动
            echo ">>> 等待所有服务启动..."
            sleep 30

            # 检查服务状态
            echo ">>> 检查服务状态..."
            $DC ps

            # 检查 server 容器是否在运行（防止 OOM 崩溃后工作流仍显示绿色）
            echo ">>> 检查 server 容器运行状态..."
            # docker compose ps --format json 输出可能多行，取第一行
            server_json=$($DC ps -a --format json server 2>/dev/null | head -n 1 || echo "")
            echo ">>> server 容器 JSON: $server_json"
            # 解析 State 字段（兼容 running/exited 等状态）
            server_state=$(echo "$server_json" | python3 -c "import sys,json; print(json.loads(sys.stdin.read()).get('State','unknown'))" 2>/dev/null || echo "parse_error")
            echo ">>> server 容器状态: $server_state"
            if [ "$server_state" != "running" ]; then
              echo ">>> 错误：server 容器未在运行（状态: $server_state），输出完整日志："
              $DC logs --tail 300 server
              echo ">>> 检查 OOM..."
              docker inspect jlyl-cloud-server 2>/dev/null | grep -i oomkilled || echo "无 OOM 信息"
              exit 1
            fi

            # 健康检查（严格模式：失败则 exit 1，确保工作流变红）
            echo ">>> 健康检查..."
            health_response=$(curl -s http://localhost:3002/health || echo "CURL_FAILED")
            echo "$health_response"
            echo ""
            echo ">>> 诊断检查..."
            curl -s http://localhost:3002/diagnose || echo "诊断检查失败"
            echo ""

            # 严格健康检查：如果不含 "ok" 则输出日志并退出
            if ! echo "$health_response" | grep -q '"status":"ok"'; then
              echo ">>> 健康检查失败！输出 server 完整日志（最后 300 行）："
              $DC logs --tail 300 server
              echo ">>> server 容器状态："
              $DC ps -a server
              echo ">>> 部署失败！"
              exit 1
            fi
            echo ">>> 健康检查通过！"

            # 持续监控 2 分钟，确保 server 和 db 不会立即崩溃
            echo ">>> 持续监控所有容器 2 分钟（12 次每 10 秒）..."
            for i in $(seq 1 12); do
              sleep 10
              for cname in jlyl-cloud-db jlyl-cloud-server jlyl-cloud-web jlyl-cloud-worker jlyl-cloud-publish-worker; do
                current_state=$(docker inspect $cname --format '{{.State.Status}}' 2>/dev/null || echo "not_found")
                if [ "$current_state" != "running" ]; then
                  echo ">>> 监控 ($i/12): $cname 已停止！状态: $current_state"
                  $DC logs --tail 200 ${cname#jlyl-cloud-}
                  exit 1
                fi
              done
              if [ $((i % 3)) -eq 0 ]; then
                health=$(curl -s http://localhost:3002/health 2>/dev/null | head -c 100 || echo "curl_failed")
                echo ">>> 监控 ($i/12): 全部运行中，health=$health"
              fi
            done
            echo ">>> 2 分钟监控通过！"

            # 检查并修复 nginx 反向代理
            echo ">>> 检查 nginx 反向代理状态..."
            if command -v nginx > /dev/null 2>&1; then
              echo ">>> nginx 已安装，检查状态..."
              if ! pgrep -x nginx > /dev/null 2>&1; then
                echo ">>> nginx 未运行，尝试启动..."
                nginx -t 2>&1 || echo ">>> nginx 配置测试失败"
                systemctl start nginx 2>/dev/null || service nginx start 2>/dev/null || nginx 2>&1
                sleep 3
              fi

              # v2.4.0：自动配置 WebSocket 转发
              #   原因：Nginx 默认不转发 WS 的 Upgrade/Connection 头，导致桌面端 WS 握手失败
              #   策略：查找处理 jlyl 域名的 server 块，在 server_name 行之后插入 location /ws
              #   幂等：已有 /ws 配置则跳过，不重复添加
              #   实现用纯 bash（awk + printf），避免多行字符串破坏 YAML 缩进
              echo ">>> 检查并配置 WebSocket 转发..."

              # WS 配置块写入临时文件（用 printf 逐行拼接，避免多行字符串在 YAML 中的缩进问题）
              #   单引号内 $ 不展开，$http_upgrade / $host 保持字面量传给 nginx
              printf '%s\n' \
                '    # v2.4.0 WebSocket 转发（自动添加，请勿删除）' \
                '    location /ws {' \
                '        proxy_pass http://127.0.0.1:3002;' \
                '        proxy_http_version 1.1;' \
                '        proxy_set_header Upgrade $http_upgrade;' \
                '        proxy_set_header Connection "upgrade";' \
                '        proxy_set_header Host $host;' \
                '        proxy_read_timeout 86400s;' \
                '        proxy_send_timeout 86400s;' \
                '    }' > /tmp/ws_block.conf
              WS_BLOCK=$(cat /tmp/ws_block.conf)

              # 找到包含 jlyl/3002 关键字的 nginx 配置文件
              NGINX_CONFS=""
              for dir in /etc/nginx/sites-enabled /etc/nginx/conf.d /etc/nginx/sites-available; do
                if [ -d "$dir" ]; then
                  for f in "$dir"/*; do
                    [ -f "$f" ] || continue
                    if grep -q -E 'jlyl|report\.jlyl|3002' "$f" 2>/dev/null; then
                      NGINX_CONFS="$NGINX_CONFS $f"
                    fi
                  done
                fi
              done
              # 单独检查 nginx.conf
              if [ -f /etc/nginx/nginx.conf ] && grep -q -E 'jlyl|report\.jlyl|3002' /etc/nginx/nginx.conf 2>/dev/null; then
                NGINX_CONFS="$NGINX_CONFS /etc/nginx/nginx.conf"
              fi

              if [ -z "$NGINX_CONFS" ]; then
                echo ">>> 未找到包含 jlyl/3002 的 nginx 配置文件"
              else
                echo ">>> 候选配置文件: $NGINX_CONFS"
              fi

              for conf_file in $NGINX_CONFS; do
                # v2.4.2：跳过备份文件，避免修改 .bak.* 文件
                case "$conf_file" in
                  *.bak*) echo ">>> [skip] $conf_file 是备份文件"; continue ;;
                esac

                # v2.4.2：不再"检测后跳过"，改为每次都重新写入
                #   原 bug：jlyl-cloud.conf 中有多个 server 块（HTTP 80 + HTTPS 443），
                #     脚本只检查"文件中是否有 /ws"，看到第一个 server 块有 /ws 就跳过，
                #     但 443 端口的 server 块可能没有 /ws，导致 wss:// 请求走默认 location / 转发到 3011
                #   修复：1. 删除所有现有的 location /ws { ... } 块
                #         2. 在每个 server_name 行之后都插入新的 /ws 配置（确保每个 server 块都有）

                # 备份原文件
                cp "$conf_file" "$conf_file.bak.ws"

                # 1. 删除所有现有的 location /ws { ... } 块（不管端口对不对）
                #   用 awk 统计大括号深度，删除整个块
                awk '
                  BEGIN { in_ws = 0; brace_depth = 0 }
                  /location[[:space:]]+\/ws[[:space:]]*\{/ {
                    in_ws = 1
                    brace_depth = 1
                    next
                  }
                  in_ws == 1 {
                    for (i = 1; i <= length($0); i++) {
                      c = substr($0, i, 1)
                      if (c == "{") brace_depth++
                      else if (c == "}") {
                        brace_depth--
                        if (brace_depth == 0) {
                          in_ws = 0
                          next
                        }
                      }
                    }
                    next
                  }
                  { print }
                ' "$conf_file" > "$conf_file.tmp" && mv "$conf_file.tmp" "$conf_file"

                # 2. 在每个 server_name 行之后都插入 WS_BLOCK（确保每个 server 块都有 /ws 配置）
                if grep -q -E 'server_name\s' "$conf_file"; then
                  awk -v block="$WS_BLOCK" '
                    /server_name[[:space:]]+[^;]+;/ {
                      print $0
                      print block
                      next
                    }
                    { print }
                  ' "$conf_file" > "$conf_file.tmp" && mv "$conf_file.tmp" "$conf_file"
                  SERVER_COUNT=$(grep -c -E 'server_name\s+[^;]+;' "$conf_file")
                  echo ">>> [modified] $conf_file (删除旧 /ws 块 + 在 $SERVER_COUNT 个 server_name 后插入新 /ws)"
                else
                  echo ">>> [warn] $conf_file 未找到 server_name，跳过插入"
                fi
              done

              # 测试并重载 nginx
              echo ">>> 测试 nginx 配置..."
              if nginx -t 2>&1; then
                echo ">>> nginx 配置测试通过，重载..."
                systemctl reload nginx 2>/dev/null || service nginx reload 2>/dev/null || nginx -s reload 2>&1
                sleep 2

                # 验证 WS 端点是否可访问（curl 升级握手测试）
                echo ">>> 验证 WebSocket 端点..."
                WS_TEST=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: report.jlyl.net.cn" \
                  -H "Upgrade: websocket" \
                  -H "Connection: Upgrade" \
                  -H "Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==" \
                  -H "Sec-WebSocket-Version: 13" \
                  -k https://127.0.0.1/ws 2>&1 || echo "CURL_FAILED")
                echo ">>> WS 握手响应 HTTP 状态码: $WS_TEST"
                if [ "$WS_TEST" = "101" ] || [ "$WS_TEST" = "426" ] || [ "$WS_TEST" = "400" ]; then
                  echo ">>> WS 端点响应正常（$WS_TEST 表示 Nginx 已转发到后端）"
                elif [ "$WS_TEST" = "404" ]; then
                  echo ">>> 警告：WS 返回 404，可能配置未生效或 server 块不匹配"
                else
                  echo ">>> WS 返回: $WS_TEST（可能是鉴权失败，握手流程正确）"
                fi
              else
                echo ">>> 警告：nginx 配置测试失败，回滚 WS 配置"
                for bak in /etc/nginx/*.bak.ws /etc/nginx/conf.d/*.bak.ws /etc/nginx/sites-enabled/*.bak.ws /etc/nginx/sites-available/*.bak.ws; do
                  if [ -f "$bak" ]; then
                    orig="${bak%.bak.ws}"
                    cp "$bak" "$orig"
                    echo ">>> 已回滚: $orig"
                  fi
                done
              fi

              echo ">>> nginx 状态:"
              systemctl status nginx 2>/dev/null | head -10 || ps aux | grep nginx | head -5
              echo ">>> === nginx 错误日志（最后 30 行）==="
              tail -30 /var/log/nginx/error.log 2>/dev/null || echo "无错误日志"
              echo ">>> === nginx access 日志（最后 10 行）==="
              tail -10 /var/log/nginx/access.log 2>/dev/null || echo "无 access 日志"
              echo ">>> === 检查 report.jlyl.net.cn:443 访问 ==="
              curl -s -I -k -H "Host: report.jlyl.net.cn" https://127.0.0.1/api/health 2>&1 | head -10
              echo ">>> === 检查 report.jlyl.net.cn:443 直接访问 /api/ ==="
              curl -s -k -H "Host: report.jlyl.net.cn" https://127.0.0.1/api/users/getLoginUser 2>&1 | head -5
              echo ">>> === 检查 127.0.0.1:3002 直接访问 ==="
              curl -s -I http://127.0.0.1:3002/health 2>&1 | head -10
              echo ">>> === 检查 iptables 防火墙规则 ==="
              iptables -L -n 2>/dev/null | head -20 || echo "无 iptables"
              echo ">>> === 检查 ufw 状态 ==="
              ufw status 2>/dev/null || echo "无 ufw"
              echo ">>> === 重启 nginx 试图修复 ==="
              systemctl restart nginx 2>/dev/null || service nginx restart 2>/dev/null || (nginx -s stop 2>/dev/null; sleep 2; nginx)
              sleep 5
              echo ">>> 重启后检查 report.jlyl.net.cn:443 ==="
              curl -s -I -k -H "Host: report.jlyl.net.cn" https://127.0.0.1/api/health 2>&1 | head -10
            else
              echo ">>> nginx 未安装，检查其他反向代理..."
              ps aux | grep -E "caddy|haproxy|traefik" | grep -v grep || echo "未发现其他反向代理"
            fi

            echo "===== 部署完成 ====="
            echo ">>> 服务访问地址:"
            echo "    前端: http://localhost:3011"
            echo "    后端: http://localhost:3002"
            echo "    健康检查: http://localhost:3002/health"
