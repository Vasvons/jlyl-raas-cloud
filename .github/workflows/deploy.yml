name: Deploy to Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "===== 开始部署 jlyl-cloud ====="
            cd /opt/jlyl-cloud

            # 拉取最新代码
            echo ">>> 拉取最新代码..."
            # 确保 remote 使用 HTTPS（避免服务器 SSH 22 端口被墙导致拉取失败）
            git remote set-url origin https://github.com/Vasvons/jlyl-raas-cloud.git
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            # 创建 .env 文件（如果不存在）
            if [ ! -f .env ]; then
              echo ">>> 创建 .env 文件..."
              cat > .env << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            EOF
            else
              echo ">>> .env 文件已存在，跳过创建"
            fi

            # 构建并启动服务（兼容新版Docker使用 docker compose，旧版使用 docker-compose）
            echo ">>> 检测 docker compose 命令..."
            if docker compose version > /dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose > /dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "错误：未找到 docker compose 或 docker-compose 命令"
              exit 1
            fi
            echo ">>> 使用命令: $DC"

            echo ">>> 构建 Docker 镜像..."
            $DC build

            echo ">>> 启动服务..."
            $DC up -d

            # 等待服务启动
            echo ">>> 等待服务启动..."
            sleep 15

            # 检查服务状态
            echo ">>> 检查服务状态..."
            $DC ps

            # 清理旧镜像
            echo ">>> 清理旧镜像..."
            docker image prune -f

            echo "===== 部署完成 ====="
            echo ">>> 服务访问地址:"
            echo "    前端: http://localhost:3011"
            echo "    后端: http://localhost:3002"
            echo "    健康检查: http://localhost:3002/health"
