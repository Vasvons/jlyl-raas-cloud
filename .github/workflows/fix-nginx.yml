name: Fix Nginx HTTPS Config

on:
  workflow_dispatch:

jobs:
  fix-nginx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload nginx config via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/nginx-report.conf"
          target: "/tmp/nginx-report.conf.new"
          overwrite: true

      - name: Apply nginx config and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "===== 开始修复 nginx HTTPS 配置 ====="

            # 1. 验证上传的文件
            echo ">>> 1. 验证上传的配置文件:"
            if [ -f /tmp/nginx-report.conf.new/deploy/nginx-report.conf ]; then
              echo "  文件存在"
              ls -la /tmp/nginx-report.conf.new/deploy/nginx-report.conf
            else
              echo "  错误：文件未上传成功"
              find /tmp/nginx-report.conf.new -type f 2>/dev/null || echo "  目录不存在"
              exit 1
            fi

            # 2. 备份现有配置
            echo ">>> 2. 备份现有配置..."
            cp /etc/nginx/conf.d/jlyl-cloud.conf /etc/nginx/conf.d/jlyl-cloud.conf.bak.$(date +%Y%m%d%H%M%S)
            echo "  备份完成"

            # 3. 复制新配置
            echo ">>> 3. 复制新配置..."
            cp /tmp/nginx-report.conf.new/deploy/nginx-report.conf /etc/nginx/conf.d/jlyl-cloud.conf
            echo "  复制完成"

            # 4. 检查是否已有 report.jlyl.net.cn 的 SSL 证书
            echo ">>> 4. 检查 SSL 证书..."
            if [ -d /etc/letsencrypt/live/report.jlyl.net.cn ]; then
              echo "  report.jlyl.net.cn 证书已存在，使用专属证书"
              sed -i 's|/etc/letsencrypt/live/REPORT_DOMAIN/fullchain.pem|/etc/letsencrypt/live/report.jlyl.net.cn/fullchain.pem|g' /etc/nginx/conf.d/jlyl-cloud.conf
              sed -i 's|/etc/letsencrypt/live/REPORT_DOMAIN/privkey.pem|/etc/letsencrypt/live/report.jlyl.net.cn/privkey.pem|g' /etc/nginx/conf.d/jlyl-cloud.conf
            else
              echo "  report.jlyl.net.cn 证书不存在，临时使用 www.jlyl.net.cn 证书"
              sed -i 's|/etc/letsencrypt/live/REPORT_DOMAIN/fullchain.pem|/etc/letsencrypt/live/www.jlyl.net.cn/fullchain.pem|g' /etc/nginx/conf.d/jlyl-cloud.conf
              sed -i 's|/etc/letsencrypt/live/REPORT_DOMAIN/privkey.pem|/etc/letsencrypt/live/www.jlyl.net.cn/privkey.pem|g' /etc/nginx/conf.d/jlyl-cloud.conf
            fi

            # 5. 显示最终配置
            echo ">>> 5. 最终配置内容:"
            cat /etc/nginx/conf.d/jlyl-cloud.conf

            # 6. 测试 nginx 配置
            echo ">>> 6. 测试 nginx 配置..."
            if nginx -t; then
              echo "  nginx 配置测试通过"
            else
              echo "  nginx 配置测试失败，恢复备份"
              cp /etc/nginx/conf.d/jlyl-cloud.conf.bak.* /etc/nginx/conf.d/jlyl-cloud.conf 2>/dev/null || true
              exit 1
            fi

            # 7. 重载 nginx
            echo ">>> 7. 重载 nginx..."
            nginx -s reload
            echo "  nginx 重载成功"

            # 8. 申请 report.jlyl.net.cn 证书（如果还没有）
            if [ ! -d /etc/letsencrypt/live/report.jlyl.net.cn ]; then
              echo ">>> 8. 申请 report.jlyl.net.cn SSL 证书..."
              mkdir -p /var/www/certbot
              if command -v certbot > /dev/null 2>&1; then
                echo "  使用 certbot webroot 模式申请证书..."
                certbot certonly --webroot -w /var/www/certbot -d report.jlyl.net.cn --non-interactive --agree-tos -m admin@jlyl.net.cn || {
                  echo "  certbot 申请失败，保持临时证书配置"
                }
                # 如果证书申请成功，切换到专属证书
                if [ -d /etc/letsencrypt/live/report.jlyl.net.cn ]; then
                  echo "  证书申请成功，切换到 report.jlyl.net.cn 证书..."
                  sed -i 's|/etc/letsencrypt/live/www.jlyl.net.cn/fullchain.pem|/etc/letsencrypt/live/report.jlyl.net.cn/fullchain.pem|g' /etc/nginx/conf.d/jlyl-cloud.conf
                  sed -i 's|/etc/letsencrypt/live/www.jlyl.net.cn/privkey.pem|/etc/letsencrypt/live/report.jlyl.net.cn/privkey.pem|g' /etc/nginx/conf.d/jlyl-cloud.conf
                  nginx -t && nginx -s reload
                  echo "  已切换到 report.jlyl.net.cn 证书"
                fi
              else
                echo "  certbot 未安装，保持临时证书配置"
              fi
            fi

            # 9. 验证 HTTPS 访问
            echo ">>> 9. 验证 HTTPS 访问..."
            sleep 2
            echo "  HTTPS 根路径:"
            curl -sk -o /dev/null -w "    HTTP %{http_code}, %{size_download} bytes\n" https://report.jlyl.net.cn/ || echo "    访问失败"
            echo "  HTTPS API 健康检查:"
            curl -sk -o /dev/null -w "    HTTP %{http_code}, %{size_download} bytes\n" https://report.jlyl.net.cn/api/health || echo "    访问失败"
            echo "  HTTPS 分享链接:"
            curl -sk -o /dev/null -w "    HTTP %{http_code}, %{size_download} bytes\n" "https://report.jlyl.net.cn/share/eae9816dfd6ea9910bbaa0f16e96de4aa6edd5e0992acd78d4e9791181182a79" || echo "    访问失败"

            # 10. 清理临时文件
            echo ">>> 10. 清理临时文件..."
            rm -rf /tmp/nginx-report.conf.new
            echo "  清理完成"

            echo "===== 修复完成 ====="
