name: Diagnose Nginx

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose nginx via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "===== nginx 诊断 ====="

            echo ">>> 1. nginx 进程状态:"
            ps aux | grep -E "nginx" | grep -v grep || echo "  nginx 未运行"

            echo ""
            echo ">>> 2. nginx 配置测试:"
            nginx -t 2>&1 || echo "  配置测试失败"

            echo ""
            echo ">>> 3. 当前 jlyl-cloud.conf 内容:"
            cat /etc/nginx/conf.d/jlyl-cloud.conf

            echo ""
            echo ">>> 4. nginx 主配置 nginx.conf:"
            cat /etc/nginx/nginx.conf

            echo ""
            echo ">>> 5. 监听端口:"
            ss -tlnp | grep -E ":(80|443|3001|3002|3011) " || echo "  未找到监听"

            echo ""
            echo ">>> 6. 测试 443 端口默认 server:"
            curl -sk -o /dev/null -w "  HTTP %{http_code}\n" https://127.0.0.1/ -H "Host: report.jlyl.net.cn"
            curl -sk -o /dev/null -w "  HTTP %{http_code}\n" https://127.0.0.1/ -H "Host: www.jlyl.net.cn"
            curl -sk -o /dev/null -w "  HTTP %{http_code}\n" https://127.0.0.1/ -H "Host: unknown.com"

            echo ""
            echo ">>> 7. 测试 3011 端口（jlyl-cloud 前端）:"
            curl -s -o /dev/null -w "  HTTP %{http_code}\n" http://127.0.0.1:3011/ || echo "  访问失败"

            echo ""
            echo ">>> 8. 测试 3002 端口（jlyl-cloud 后端）:"
            curl -s -o /dev/null -w "  HTTP %{http_code}\n" http://127.0.0.1:3002/health || echo "  访问失败"

            echo ""
            echo ">>> 9. 测试 3001 端口（业务家）:"
            curl -s -o /dev/null -w "  HTTP %{http_code}\n" http://127.0.0.1:3001/ || echo "  访问失败"

            echo ""
            echo ">>> 10. nginx 错误日志最后 30 行:"
            tail -30 /var/log/nginx/error.log 2>/dev/null || echo "  无错误日志"

            echo ""
            echo ">>> 11. 检查是否有 default_server:"
            grep -rn "default_server" /etc/nginx/ 2>/dev/null || echo "  未找到 default_server"

            echo ""
            echo ">>> 12. 所有 conf 文件:"
            ls -la /etc/nginx/conf.d/

            echo "===== 诊断完成 ====="
