# jlyl-cloud Nginx 配置
# report.jlyl.net.cn -> jlyl-cloud (Next.js 3011 + API 3002)

# HTTP: 跳转到 HTTPS
server {
    listen 80;
    server_name report.jlyl.net.cn;

    # 用于 certbot 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: 反向代理到 jlyl-cloud（标记为 default_server，确保优先级最高）
server {
    listen 443 ssl default_server;
    server_name report.jlyl.net.cn;

    # SSL 证书（占位符，部署时会被替换为实际路径）
    ssl_certificate /etc/letsencrypt/live/REPORT_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/REPORT_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    # 前端 Next.js
    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API 请求代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }
}
