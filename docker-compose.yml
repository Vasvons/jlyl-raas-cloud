services:
  # PostgreSQL 数据库（pgvector 镜像，支持向量检索）
  # 使用 daocloud 直接镜像源前缀，避免 Docker Hub 加速器对小众镜像缓存不一致导致拉取超时
  db:
    image: docker.m.daocloud.io/pgvector/pgvector:pg15
    container_name: jlyl-cloud-db
    restart: always
    environment:
      POSTGRES_DB: jlyl_cloud
      POSTGRES_USER: jlyl
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jlyl_cloud_2024}
    volumes:
      - jlyl-cloud-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    # 限制内存 512M
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    # PostgreSQL 内存参数优化
    # maintenance_work_mem=128MB：pgvector ivfflat 索引创建需要足够内存（40MB+）
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jlyl -d jlyl_cloud"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - jlyl-cloud-network

  # 后端 API 服务
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: jlyl-cloud-server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jlyl_cloud
      DB_USER: jlyl
      DB_PASSWORD: ${DB_PASSWORD:-jlyl_cloud_2024}
      JWT_SECRET: ${JWT_SECRET:-jlyl-raas-cloud-secret-key-2024}
      JWT_EXPIRES_IN: 7d
      PORT: 3002
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGIN: "*"
    ports:
      - "127.0.0.1:3002:3002"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s
    networks:
      - jlyl-cloud-network

  # 前端 Web 服务
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: jlyl-cloud-web
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://server:3002
    ports:
      - "127.0.0.1:3011:3011"
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3011/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jlyl-cloud-network

  # 自动收录查询Worker服务
  auto-collect-worker:
    build:
      context: ./auto-collect-worker
      dockerfile: Dockerfile
    container_name: jlyl-cloud-worker
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      WORKER_PORT: 3003
      SERVER_URL: http://server:3002
      MAX_CONCURRENCY: "4"
      SHM_SIZE: "512m"
    ports:
      - "127.0.0.1:3003:3003"
    mem_limit: 2g
    memswap_limit: 2g
    shm_size: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jlyl-cloud-network

volumes:
  jlyl-cloud-db-data:
    name: jlyl-cloud-db-data

networks:
  jlyl-cloud-network:
    name: jlyl-cloud-network
    driver: bridge
