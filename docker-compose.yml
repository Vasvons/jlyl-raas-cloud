version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: jlyl-cloud-db
    restart: always
    environment:
      POSTGRES_DB: jlyl_cloud
      POSTGRES_USER: jlyl
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jlyl_cloud_2024}
    volumes:
      - jlyl-cloud-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    # 限制内存 512M
    mem_limit: 512m
    memswap_limit: 512m
    # PostgreSQL 内存参数优化
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jlyl -d jlyl_cloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jlyl-cloud-network

  # 后端 API 服务
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: jlyl-cloud-server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jlyl_cloud
      DB_USER: jlyl
      DB_PASSWORD: ${DB_PASSWORD:-jlyl_cloud_2024}
      JWT_SECRET: ${JWT_SECRET:-jlyl-raas-cloud-secret-key-2024}
      JWT_EXPIRES_IN: 7d
      PORT: 3002
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGIN: "*"
    ports:
      - "127.0.0.1:3002:3002"
    mem_limit: 512m
    networks:
      - jlyl-cloud-network

  # 前端 Web 服务
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: jlyl-cloud-web
    restart: always
    depends_on:
      - server
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://server:3002
    ports:
      - "127.0.0.1:3001:3001"
    mem_limit: 256m
    networks:
      - jlyl-cloud-network

volumes:
  jlyl-cloud-db-data:
    name: jlyl-cloud-db-data

networks:
  jlyl-cloud-network:
    name: jlyl-cloud-network
    driver: bridge
